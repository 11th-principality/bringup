<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミニたまごっち風ゲーム</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }
        /* ガラケー・たまごっち風の本体 */
        .game-container {
            width: 300px;
            height: 400px;
            background-color: #ff9a9e;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border: 8px solid #ff6b81;
        }
        /* 液晶画面 */
        .screen {
            width: 100%;
            height: 220px;
            background-color: #e0ece4;
            border: 5px solid #555;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        /* キャラクター */
        .character {
            font-size: 50px;
            position: absolute;
            bottom: 20px;
            left: 110px;
            transition: left 1s ease-in-out, transform 0.2s;
            user-select: none;
        }
        /* おやつ（出現時用） */
        .snack {
            font-size: 30px;
            position: absolute;
            bottom: 25px;
            right: 40px;
            display: none;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        /* ボタンエリア */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            background-color: #fff;
            color: #333;
            box-shadow: 0 4px 0 #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- 画面 -->
    <div class="screen">
        <div id="character" class="character">(o^^o)</div>
        <div id="snack" class="snack">🍩</div>
    </div>

    <!-- 操作ボタン -->
    <div class="controls">
        <button onclick="giveSnack()">おやつ</button>
        <button onclick="changeOutfit()">きがえ</button>
    </div>
</div>

<script>
    const character = document.getElementById('character');
    const snack = document.getElementById('snack');

    // キャラクターの状態
    let currentOutfit = 0;
    const outfits = ["(o^^o)", "🤠(o^^o)", "👑(o^^o)🎀", "🕶️(o_o)"]; // 服装（見た目）のバリエーション

    // 1. 自動でウロウロ動く処理
    function walkAround() {
        // 画面の幅（300px）からキャラの幅を引いた範囲でランダムに移動
        const randomX = Math.floor(Math.random() * 180) + 10;
        character.style.left = randomX + 'px';
        
        // ランダムな時間（1.5秒〜3.5秒）ごとに次の移動をする
        const randomTime = Math.floor(Math.random() * 2000) + 1500;
        setTimeout(walkAround, randomTime);
    }
    // 最初にウロウロを開始
    walkAround();

    // 2. おやつをあげる処理
    function giveSnack() {
        // おやつを表示
        snack.style.display = 'block';
        
        // キャラがおやつの方向（右側）を向いて近づく
        character.style.left = '160px';
        
        setTimeout(() => {
            // もぐもぐする（顔が変わる）
            const oldFace = outfits[currentOutfit];
            character.innerText = "抱( 👑 🍇 )"; // もぐもぐ中の仮の姿
            character.innerText = oldFace.replace("(o^^o)", "(^Q^)")
                                         .replace("(o_o)", "(^Q^)"); 
            
            // おやつが消える
            snack.style.display = 'none';
            
            // 1秒後に元の顔に戻る
            setTimeout(() => {
                character.innerText = outfits[currentOutfit];
            }, 1000);
        }, 1200);
    }

    // 3. 服装が変わる処理
    function changeOutfit() {
        currentOutfit = (currentOutfit + 1) % outfits.length;
        character.innerText = outfits[currentOutfit];
        
        // ピョコッと跳ねるアニメーション
        character.style.transform = 'scale(1.2) translateY(-10px)';
        setTimeout(() => {
            character.style.transform = 'scale(1) translateY(0)';
        }, 2000);
    }
</script>

</body>
</html>
