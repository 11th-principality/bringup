<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海の見える部屋のよにん</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        .stage-container {
            width: 350px;
            height: 550px;
            background-image: url('background_day.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 6px solid #fff;
            transition: background-image 2.5s ease;
        }

        .character {
            width: 95px; 
            height: 95px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            position: absolute;
            /* transitionはJSで動的に切り替え */
            cursor: grab;
            user-select: none;
            z-index: 10;
        }
        .character:active {
            cursor: grabbing;
        }

        @keyframes sleepZzz {
            0% { opacity: 0; transform: translateY(0) scale(0.6); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px) scale(1); }
        }
        .character.sleep::after {
            content: '💤';
            position: absolute;
            top: -10px;
            right: 10px;
            font-size: 16px;
            animation: sleepZzz 2s infinite ease-in-out;
        }

        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 30;
            white-space: nowrap;
            pointer-events: none;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }

        @keyframes jump {
            0%   { margin-bottom: 0px; }
            40%  { margin-bottom: 22px; }
            100% { margin-bottom: 0px; }
        }
        .jump-animation {
            animation: jump 0.4s ease;
        }

        .snack {
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 155px; 
            right: 110px;  
            display: none;
            z-index: 15;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 40;
        }

        .menu-popup {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #00796b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .menu-btn {
            background-color: #00796b;
            color: white;
        }

        /* ハート演出 */
        @keyframes floatHeart {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
        }
        .float-heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 50;
            animation: floatHeart 1.2s ease-out forwards;
        }
    </style>
</head>
<body>

<div class="stage-container" id="stage">
    <div id="bubble1" class="speech-bubble"></div>
    <div id="bubble2" class="speech-bubble"></div>
    <div id="bubble3" class="speech-bubble"></div>
    <div id="bubble4" class="speech-bubble"></div>

    <div id="chara1" class="character"></div>
    <div id="chara2" class="character"></div>
    <div id="chara3" class="character"></div>
    <div id="chara4" class="character"></div>

    <div id="snack" class="snack"></div>

    <div class="controls">
        <div id="menuPopup" class="menu-popup">
            <button onclick="giveFood('snack.png')">🍩 ドーナツ</button>
            <button onclick="giveFood('parfait.png')">🍨 パフェ</button>
            <button onclick="giveFood('food_meat.png')">🍖 ほねつき肉</button>
            <button onclick="giveFood('food_omurice.png')">🍳 オムライス</button>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">みんなにごはんをあげる</button>
    </div>
</div>

<script>
    const stage = document.getElementById('stage');
    const snack = document.getElementById('snack');
    const menuPopup = document.getElementById('menuPopup');

    // ── 時間帯 ──────────────────────────────────────────
    let currentTimeOfDay = -1;
    const backgrounds = {
        0: 'background_morning.png',
        1: 'background_day.png',
        2: 'background_evening.png',
        3: 'background_night.png'
    };

    function getTimeOfDay() {
        const h = new Date().getHours();
        if (h >= 5  && h < 11) return 0;
        if (h >= 11 && h < 17) return 1;
        if (h >= 17 && h < 21) return 2;
        return 3;
    }
    function updateBackground() {
        const t = getTimeOfDay();
        if (t !== currentTimeOfDay) {
            currentTimeOfDay = t;
            stage.style.backgroundImage = `url('${backgrounds[t]}')`;
        }
    }
    setInterval(updateBackground, 30000);
    updateBackground();

    // ── キャラクター定義 ─────────────────────────────────
    const charas = [
        { id:1, element:document.getElementById('chara1'), bubble:document.getElementById('bubble1'),
          imgNormal:'chara_normal.png',  imgEat:'chara_eat.png',         imgSleep:'chara1_sleep.png', imgKyaa:'chara1_kyaa.png',
          x:40,  y:60,  direction:1, isReacting:false, isSleeping:false, isDragging:false, petCount:0, walkTimer:null },
        { id:2, element:document.getElementById('chara2'), bubble:document.getElementById('bubble2'),
          imgNormal:'chara_island.png',  imgEat:'chara_island_eat.png',  imgSleep:'chara2_sleep.png', imgKyaa:'chara2_kyaa.png',
          x:120, y:110, direction:1, isReacting:false, isSleeping:false, isDragging:false, petCount:0, walkTimer:null },
        { id:3, element:document.getElementById('chara3'), bubble:document.getElementById('bubble3'),
          imgNormal:'chara_death.png',   imgEat:'chara_death_eat.png',   imgSleep:'chara3_sleep.png', imgKyaa:'chara3_kyaa.png',
          x:200, y:70,  direction:1, isReacting:false, isSleeping:false, isDragging:false, petCount:0, walkTimer:null },
        { id:4, element:document.getElementById('chara4'), bubble:document.getElementById('bubble4'),
          imgNormal:'chara_priest.png',  imgEat:'chara_priest_eat.png',  imgSleep:'chara4_sleep.png', imgKyaa:'chara4_kyaa.png',
          x:260, y:120, direction:1, isReacting:false, isSleeping:false, isDragging:false, petCount:0, walkTimer:null }
    ];

    const chatPhrases = [
        ["🫧","🌱"], ["☀️","🌟"], ["🌊","🌈"], ["🌸","🍀"], ["🌻","💐"]
    ];

    // ── 描画ユーティリティ ───────────────────────────────

    /**
     * キャラの位置・スケールを更新する。
     * @param {object} c        キャラオブジェクト
     * @param {boolean} animate true=スムーズ移動, false=瞬間移動（ドラッグ中）
     */
    function updatePosition(c, animate) {
        // ドラッグ中はtransitionなし、それ以外はスムーズに
        c.element.style.transition = animate
            ? 'left 1.5s ease-in-out, bottom 1.5s ease-in-out, transform 0.3s ease'
            : 'none';
        c.bubble.style.transition = animate
            ? 'left 1.5s ease-in-out, bottom 1.5s ease-in-out'
            : 'none';

        c.element.style.left   = c.x + 'px';
        c.element.style.bottom = c.y + 'px';

        // ── スケール ──
        // ドラッグ中は固定スケール(1.0)でサイズ変化なし
        let scaleFactor;
        if (c.isDragging) {
            scaleFactor = 1.0;
        } else {
            // y=40→scale 1.0、y=150→scale 0.65（奥に行くほど小さく）
            scaleFactor = 1 - Math.max(0, Math.min(c.y - 40, 110)) / 110 * 0.35;
        }

        const scaleX = c.direction * scaleFactor;
        const scaleY = scaleFactor;
        c.element.style.setProperty('--base-scale-x', scaleX);
        c.element.style.setProperty('--base-scale-y', scaleY);
        c.element.style.transform = `scale(${scaleX}, ${scaleY})`;
        c.element.style.zIndex    = 20 - Math.floor(c.y / 10);

        // 吹き出し位置（スケールに合わせて少し上に）
        c.bubble.style.left   = (c.x + 5) + 'px';
        c.bubble.style.bottom = (c.y + 90 * scaleFactor) + 'px';
    }

    function showBubble(c, text) {
        c.bubble.innerText = text;
        c.bubble.style.display = 'block';
    }

    // ── 歩行システム ──────────────────────────────────────
    // タイマーを管理し、停止→再起動を確実に行う

    function scheduleWalk(c) {
        // すでに予約済みなら上書きしない
        if (c.walkTimer) return;
        c.walkTimer = setTimeout(() => {
            c.walkTimer = null;
            doWalk(c);
        }, Math.floor(Math.random() * 1800) + 1200);
    }

    function doWalk(c) {
        // 何らかのアクション中は少し待って再試行
        if (c.isReacting || c.isSleeping || c.isDragging) {
            scheduleWalk(c);
            return;
        }

        const newX = Math.floor(Math.random() * 215) + 15;
        const newY = Math.floor(Math.random() * 110) + 40;
        c.direction = (newX < c.x) ? 1 : -1;
        c.x = newX;
        c.y = newY;
        updatePosition(c, true);

        if (Math.random() < 0.15) checkChat();

        scheduleWalk(c);
    }

    // 初期化＆起動
    charas.forEach(c => {
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        updatePosition(c, false);
        makeDraggable(c);
        scheduleWalk(c);
    });

    // ── おしゃべりシステム ───────────────────────────────
    function checkChat() {
        const i1 = Math.floor(Math.random() * 4);
        const i2 = (i1 + 1) % 4;
        const c1 = charas[i1], c2 = charas[i2];
        if (c1.isReacting || c2.isReacting || c1.isSleeping || c2.isSleeping) return;

        const dist = Math.abs(c1.x - c2.x) + Math.abs(c1.y - c2.y);
        if (dist >= 90) return;

        c1.isReacting = c2.isReacting = true;
        c1.direction = (c1.x < c2.x) ? -1 : 1;
        c2.direction = (c2.x < c1.x) ? -1 : 1;
        updatePosition(c1, true);
        updatePosition(c2, true);

        const pair = chatPhrases[Math.floor(Math.random() * chatPhrases.length)];
        showBubble(c1, pair[0]);
        setTimeout(() => showBubble(c2, pair[1]), 700);

        setTimeout(() => {
            c1.bubble.style.display = c2.bubble.style.display = 'none';
            c1.isReacting = c2.isReacting = false;
            // 会話が終わったら歩行を再スケジュール
            scheduleWalk(c1);
            scheduleWalk(c2);
        }, 2600);
    }

    // ── ドラッグシステム ─────────────────────────────────
    function makeDraggable(chara) {
        let dragging = false;
        let startClientX, startClientY, startCharaX, startCharaY;

        function onDragStart(clientX, clientY) {
            if (chara.isSleeping) return;
            dragging = true;
            chara.isDragging = true;
            chara.isReacting = true;

            // タイマーをクリアして歩行を止める
            if (chara.walkTimer) {
                clearTimeout(chara.walkTimer);
                chara.walkTimer = null;
            }

            startClientX = clientX;
            startClientY = clientY;
            startCharaX  = chara.x;
            startCharaY  = chara.y;

            chara.element.style.backgroundImage = `url('${chara.imgKyaa}')`;
            updatePosition(chara, false);
        }

        function onDragMove(clientX, clientY) {
            if (!dragging) return;
            const stageRect = stage.getBoundingClientRect();
            // stage内のスケールを考慮しないシンプルな座標変換
            const dx = clientX - startClientX;
            const dy = clientY - startClientY;

            chara.x = Math.max(0, Math.min(startCharaX + dx, 255));
            chara.y = Math.max(10, Math.min(startCharaY - dy, 440));
            updatePosition(chara, false);  // ← animate=false でスケール固定
        }

        function onDragEnd() {
            if (!dragging) return;
            dragging = false;
            chara.isDragging = false;

            // 地面の範囲に着地
            if (chara.y > 150) chara.y = 150;
            if (chara.y < 40)  chara.y = 40;

            chara.element.style.backgroundImage = `url('${chara.imgNormal}')`;
            chara.isReacting = false;
            updatePosition(chara, true);  // ← animate=true でスムーズ着地

            showBubble(chara, '💦💦');
            setTimeout(() => {
                if (!chara.isReacting) chara.bubble.style.display = 'none';
            }, 1400);

            // 歩行を再開
            scheduleWalk(chara);
        }

        // PC
        chara.element.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            e.preventDefault();
            onDragStart(e.clientX, e.clientY);
        });
        document.addEventListener('mousemove', e => { if (dragging) onDragMove(e.clientX, e.clientY); });
        document.addEventListener('mouseup',   e => { if (dragging) onDragEnd(); });

        // スマホ
        chara.element.addEventListener('touchstart', e => {
            e.preventDefault();
            onDragStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchmove', e => {
            if (dragging) { e.preventDefault(); onDragMove(e.touches[0].clientX, e.touches[0].clientY); }
        }, { passive: false });
        document.addEventListener('touchend', () => { if (dragging) onDragEnd(); });

        // タップ（なでなで）
        chara.element.addEventListener('click', () => tapChara(chara));
    }

    // ── なでなで→ねんね ─────────────────────────────────
    function spawnHeart(c) {
        const heart = document.createElement('div');
        heart.className = 'float-heart';
        heart.textContent = ['💖','💕','💗','💓'][Math.floor(Math.random() * 4)];
        heart.style.left   = (c.x + 20 + Math.random() * 40) + 'px';
        heart.style.bottom = (c.y + 80) + 'px';
        stage.appendChild(heart);
        setTimeout(() => heart.remove(), 1200);
    }

    function tapChara(c) {
        if (c.isReacting || c.isSleeping || c.isDragging) return;
        c.petCount++;
        spawnHeart(c);

        if (c.petCount >= 5) {
            c.isSleeping = true;
            c.element.style.backgroundImage = `url('${c.imgSleep}')`;
            c.element.classList.add('sleep');
            showBubble(c, '……💤……💤……');

            setTimeout(() => {
                if (!c.isSleeping) return;
                c.isSleeping = false;
                c.petCount   = 0;
                c.element.style.backgroundImage = `url('${c.imgNormal}')`;
                c.element.classList.remove('sleep');
                c.bubble.style.display = 'none';
                scheduleWalk(c);  // ← 起床後に歩行再起動
            }, 8500);
        } else {
            showBubble(c, c.petCount >= 3 ? '💕' : '💖');
            setTimeout(() => {
                if (!c.isSleeping && !c.isReacting) c.bubble.style.display = 'none';
            }, 900);
        }
    }

    // ── ごはんシステム ───────────────────────────────────
    function toggleMenu() {
        menuPopup.style.display = (menuPopup.style.display === 'flex') ? 'none' : 'flex';
    }

    function giveFood(imgFile) {
        if (charas.some(c => c.isReacting || c.isSleeping)) return;
        menuPopup.style.display = 'none';

        // 全員の歩行タイマーを止める
        charas.forEach(c => {
            if (c.walkTimer) { clearTimeout(c.walkTimer); c.walkTimer = null; }
            c.isReacting = true;
        });

        snack.style.backgroundImage = `url('${imgFile}')`;
        snack.style.display = 'block';

        const targets = [
            { x:100, y:120, dir:-1 },
            { x:140, y:100, dir:-1 },
            { x:170, y:120, dir: 1 },
            { x:210, y:100, dir: 1 }
        ];
        charas.forEach((c, i) => {
            c.x = targets[i].x;
            c.y = targets[i].y;
            c.direction = targets[i].dir;
            updatePosition(c, true);
        });

        setTimeout(() => {
            charas.forEach(c => {
                c.element.style.backgroundImage = `url('${c.imgEat}')`;
            });
            snack.style.display = 'none';

            setTimeout(() => {
                charas.forEach(c => {
                    c.element.style.backgroundImage = `url('${c.imgNormal}')`;
                    c.isReacting = false;
                    updatePosition(c, true);
                    scheduleWalk(c);  // ← 食後に歩行再起動
                });
            }, 1500);
        }, 1600);
    }
</script>

</body>
</html>
