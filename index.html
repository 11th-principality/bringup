<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海の見える部屋のよにん</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        /* ゲームの舞台 */
        .stage-container {
            width: 350px;
            height: 550px;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 6px solid #fff;
        }

        /* キャラクター共通設定 */
        .character {
            width: 95px; 
            height: 95px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            position: absolute;
            transition: left 1.5s ease-in-out, bottom 1.5s ease-in-out, transform 0.3s ease;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }

        /* おしゃべり中の吹き出し */
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 30;
            white-space: nowrap;
            transition: left 1.5s ease-in-out, bottom 1.5s ease-in-out;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }

        /* ジャンプアニメーション */
        @keyframes jump {
            0% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
            50% { transform: translate(0, -25px) scale(var(--base-scale-x), var(--base-scale-y)); }
            100% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
        }
        .jump-animation {
            animation: jump 0.4s ease;
        }

        /* ごちそう（机の上にぴったり配置） */
        .snack {
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 155px; 
            right: 110px;  
            display: none;
            z-index: 15;
        }

        /* 操作パネル */
        .controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 40;
        }

        /* ごはん選択メニュー */
        .menu-popup {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #00796b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .menu-btn {
            background-color: #00796b;
            color: white;
        }
    </style>
</head>
<body>

<div class="stage-container" id="stage">
    <div id="bubble1" class="speech-bubble"></div>
    <div id="bubble2" class="speech-bubble"></div>
    <div id="bubble3" class="speech-bubble"></div>
    <div id="bubble4" class="speech-bubble"></div>

    <div id="chara1" class="character" onclick="tapChara(1)"></div>
    <div id="chara2" class="character" onclick="tapChara(2)"></div>
    <div id="chara3" class="character" onclick="tapChara(3)"></div>
    <div id="chara4" class="character" onclick="tapChara(4)"></div>

    <div id="snack" class="snack"></div>

    <div class="controls">
        <div id="menuPopup" class="menu-popup">
            <button onclick="giveFood('snack.png')">🍩 ドーナツ</button>
            <button onclick="giveFood('food_meat.png')">🍖 ほねつき肉</button>
            <button onclick="giveFood('food_omurice.png')">🍳 オムライス</button>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">みんなにごはんをあげる</button>
    </div>
</div>

<script>
    const snack = document.getElementById('snack');
    const menuPopup = document.getElementById('menuPopup');

    // 4人の豪華なスターシステムデータ
    const charas = [
        { id: 1, element: document.getElementById('chara1'), bubble: document.getElementById('bubble1'), imgNormal: 'chara_normal.png', imgEat: 'chara_eat.png', x: 40, y: 60, direction: 1, isReacting: false },
        { id: 2, element: document.getElementById('chara2'), bubble: document.getElementById('bubble2'), imgNormal: 'chara_island.png', imgEat: 'chara_island_eat.png', x: 120, y: 110, direction: 1, isReacting: false },
        { id: 3, element: document.getElementById('chara3'), bubble: document.getElementById('bubble3'), imgNormal: 'chara_death.png', imgEat: 'chara_death_eat.png', x: 200, y: 70, direction: 1, isReacting: false },
        { id: 4, element: document.getElementById('chara4'), bubble: document.getElementById('bubble4'), imgNormal: 'chara_priest.png', imgEat: 'chara_priest_eat.png', x: 260, y: 120, direction: 1, isReacting: false }
    ];

    // 賑やかな会話セリフ
    const chatPhrases = [
        ["🌱", "🌸"],
        ["🌊", "🐦️"],
        ["🍵", "💖"],
        ["🍩", "💦"],
        ["🎀", "🐕"]
    ];

    // 初期化
    charas.forEach(c => {
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        updatePosition(c);
    });

    // 画面更新（奥行き対応）
    function updatePosition(c) {
        c.element.style.left = c.x + 'px';
        c.element.style.bottom = c.y + 'px';

        // 奥行き：奥(y=160)に行くほど小さく(65%)、手前(y=40)ほど大きく(100%)
        const scaleFactor = 1 - ((c.y - 40) / 120) * 0.35;
        const scaleX = c.direction * scaleFactor;
        const scaleY = scaleFactor;

        c.element.style.setProperty('--base-scale-x', scaleX);
        c.element.style.setProperty('--base-scale-y', scaleY);
        c.element.style.transform = `scale(${scaleX}, ${scaleY})`;
        
        // 前後関係をy座標で入れ替える
        c.element.style.zIndex = 20 - Math.floor(c.y / 10);

        // 吹き出し追従
        c.bubble.style.left = (c.x + 5) + 'px';
        c.bubble.style.bottom = (c.y + 100 * scaleFactor) + 'px';
    }

    // 縦横無尽にトコトコ歩く
    function walk(charaIndex) {
        const c = charas[charaIndex];
        if (c.isReacting) return;

        const newX = Math.floor(Math.random() * 215) + 15;
        const newY = Math.floor(Math.random() * 110) + 40; 
        
        c.direction = (newX < c.x) ? 1 : -1;
        c.x = newX;
        c.y = newY;

        updatePosition(c);
        
        // たまにおしゃべりが発生するかチェック
        if (Math.random() < 0.2) {
            checkChat();
        }

        setTimeout(() => walk(charaIndex), Math.floor(Math.random() * 1800) + 1200);
    }
    
    // 4人全員を時間差で出発させる
    charas.forEach((_, index) => {
        setTimeout(() => walk(index), index * 400);
    });

    // おしゃべり発生チェック
    function checkChat() {
        const i1 = Math.floor(Math.random() * 4);
        const i2 = (i1 + 1) % 4;
        const c1 = charas[i1];
        const c2 = charas[i2];

        if (!c1.isReacting && !c2.isReacting) {
            const dist = Math.abs(c1.x - c2.x) + Math.abs(c1.y - c2.y);
            if (dist < 90) {
                c1.isReacting = true;
                c2.isReacting = true;

                const pair = chatPhrases[Math.floor(Math.random() * chatPhrases.length)];
                
                c1.direction = (c1.x < c2.x) ? -1 : 1;
                c2.direction = (c2.x < c1.x) ? -1 : 1;
                updatePosition(c1);
                updatePosition(c2);

                c1.bubble.innerText = pair[0];
                c1.bubble.style.display = 'block';

                setTimeout(() => {
                    c2.bubble.innerText = pair[1];
                    c2.bubble.style.display = 'block';
                }, 700);

                setTimeout(() => {
                    c1.bubble.style.display = 'none';
                    c2.bubble.style.display = 'none';
                    c1.isReacting = false;
                    c2.isReacting = false;
                }, 2600);
            }
        }
    }

    // タップリアクション
    function tapChara(id) {
        const c = charas.find(item => item.id === id);
        if (c.isReacting) return;
        c.isReacting = true;

        c.element.style.backgroundImage = `url('${c.imgEat}')`;
        c.element.classList.add('jump-animation');

        setTimeout(() => {
            c.element.classList.remove('jump-animation');
            c.element.style.backgroundImage = `url('${c.imgNormal}')`;
            c.isReacting = false;
            updatePosition(c);
        }, 400);
    }

    // メニューを開閉する関数（表示をflexにして綺麗に並べます）
    function toggleMenu() {
        if (menuPopup.style.display === 'flex') {
            menuPopup.style.display = 'none';
        } else {
            menuPopup.style.display = 'flex';
        }
    }

    // ✨ ごはんをあげる関数（歩行再開ロジック追加版）
    function giveFood(imgFile) {
        if (charas.some(c => c.isReacting)) return;
        menuPopup.style.display = 'none';

        snack.style.backgroundImage = `url('${imgFile}')`;
        snack.style.display = 'block';

        const targets = [
            { x: 100, y: 120, dir: -1 },
            { x: 140, y: 100, dir: -1 },
            { x: 170, y: 120, dir: 1 },
            { x: 210, y: 100, dir: 1 }
        ];

        charas.forEach((c, idx) => {
            c.isReacting = true;
            c.x = targets[idx].x;
            c.y = targets[idx].y;
            c.direction = targets[idx].dir;
            updatePosition(c);
        });

        // 机の前に到着 → もぐもぐ
        setTimeout(() => {
            charas.forEach(c => {
                c.element.style.backgroundImage = `url('${c.imgEat}')`;
            });
            snack.style.display = 'none';

            // 食事終了 → 通常に戻して再び歩き始める
            setTimeout(() => {
                charas.forEach(c => {
                    c.element.style.backgroundImage = `url('${c.imgNormal}')`;
                    c.isReacting = false;
                    updatePosition(c);   // 位置を最新状態に更新
                });
                
                // ★★★ ここで全員の歩行を再起動！ ★★★
                charas.forEach((_, index) => {
                    setTimeout(() => walk(index), 300 + index * 200);
                });
            }, 1500);
        }, 1600);
    }
</script>

</body>
</html>
