<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海の見える部屋のふたり（縦横無尽版）</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        /* ゲームの舞台 */
        .stage-container {
            width: 350px;
            height: 550px;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 6px solid #fff;
        }

        /* キャラクター共通設定 */
        .character {
            width: 100px; 
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            position: absolute;
            /* 縦横無尽に動くために、位置(left/bottom)と奥行サイズ(transform)のスピードを速く設定！ */
            transition: left 1.2s ease-in-out, bottom 1.2s ease-in-out, transform 0.3s ease;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }

        /* おしゃべり中の吹き出し */
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 30;
            white-space: nowrap;
            transition: left 1.2s ease-in-out, bottom 1.2s ease-in-out;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }

        /* ジャンプアニメーション */
        @keyframes jump {
            0% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
            50% { transform: translate(0, -30px) scale(var(--base-scale-x), var(--base-scale-y)); }
            100% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
        }
        .jump-animation {
            animation: jump 0.4s ease;
        }

        /* ドーナツ */
        .snack {
            width: 45px;
            height: 45px;
            background-image: url('snack.png');
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 90px;
            right: 40px;
            display: none;
            z-index: 5;
        }

        /* 操作ボタン */
        .controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 40;
        }
        button {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #00796b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="stage-container" id="stage">
    <div id="bubble1" class="speech-bubble"></div>
    <div id="bubble2" class="speech-bubble"></div>

    <div id="chara1" class="character" onclick="tapChara(1)"></div>
    <div id="chara2" class="character" onclick="tapChara(2)"></div>

    <div id="snack" class="snack"></div>

    <div class="controls">
        <button onclick="giveSnackAll()">ふたりにおやつ</button>
    </div>
</div>

<script>
    const snack = document.getElementById('snack');

    const charas = [
        {
            id: 1,
            element: document.getElementById('chara1'),
            bubble: document.getElementById('bubble1'),
            imgNormal: 'chara_normal.png',
            imgEat: 'chara_eat.png',
            x: 60,
            y: 80, // ✨ 縦（高さ）の初期位置
            direction: 1, 
            isReacting: false
        },
        {
            id: 2,
            element: document.getElementById('chara2'),
            bubble: document.getElementById('bubble2'),
            imgNormal: 'chara_island.png',
            imgEat: 'chara_island_eat.png',
            x: 180,
            y: 110, // ✨ 縦（高さ）の初期位置
            direction: 1,
            isReacting: false
        }
    ];

    const chatPhrases = [
        ["あ、こんにちは！", "ふふ、こんにちは。"],
        ["海がきれいで落ち着くねー", "本当、ずっと見ていられる。"],
        ["今日のおやつは何かな？", "ドーナツだといいなぁ。"],
        ["ちょっとそこのいてー！", "あはは、ごめんごめん！"],
        ["ねえねえ！", "なぁに？"]
    ];

    // 初期化
    charas.forEach(c => {
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        updatePosition(c);
    });

    // 🏃‍♂️ キャラの位置と大きさを一括で更新する魔法の関数
    function updatePosition(c) {
        c.element.style.left = c.x + 'px';
        c.element.style.bottom = c.y + 'px';

        // 💡 奥行き計算：お部屋の奥（yの数値が大きい）にいくほど、キャラをちょっと小さくする
        // 手前(y=40)なら100%、奥(y=160)なら70%のサイズ感
        const scaleFactor = 1 - ((c.y - 40) / 120) * 0.3;
        const scaleX = c.direction * scaleFactor;
        const scaleY = scaleFactor;

        // 次のアニメーション（ジャンプなど）にサイズを引き継ぐための変数
        c.element.style.setProperty('--base-scale-x', scaleX);
        c.element.style.setProperty('--base-scale-y', scaleY);

        c.element.style.transform = `scale(${scaleX}, ${scaleY})`;
        
        // 重なり順の調整（手前にいるキャラ(yが小さい)を上に表示する）
        c.element.style.zIndex = 20 - Math.floor(c.y / 10);

        // 吹き出しの位置も追従
        c.bubble.style.left = (c.x + 10) + 'px';
        c.bubble.style.bottom = (c.y + 105 * scaleFactor) + 'px';
    }

    // 1. 縦横無尽にウロウロ歩く
    function walk(charaIndex) {
        const c = charas[charaIndex];
        if (c.isReacting) return;

        // 横の移動範囲 (20px 〜 230px)
        const newX = Math.floor(Math.random() * 210) + 20;
        // 縦（奥行き）の移動範囲 (40px 〜 150px の間で自由に動く！)
        const newY = Math.floor(Math.random() * 110) + 40;
        
        // 左右反転の判定
        if (newX < c.x) {
            c.direction = 1;  // 左を向く
        } else {
            c.direction = -1; // 右を向く
        }
        
        c.x = newX;
        c.y = newY;

        updatePosition(c);
        checkChat();

        // 次に動くまでの時間を「1秒〜2.5秒」に短縮して大忙しに！
        const nextTime = Math.floor(Math.random() * 1500) + 1000;
        setTimeout(() => walk(charaIndex), nextTime);
    }
    
    // 二人を出発させる
    setTimeout(() => walk(0), 0);
    setTimeout(() => walk(1), 500);

    // 2. おしゃべりするシステム
    function checkChat() {
        // 縦も横も位置が近くなったらおしゃべり
        const distanceX = Math.abs(charas[0].x - charas[1].x);
        const distanceY = Math.abs(charas[0].y - charas[1].y);

        if (distanceX < 70 && distanceY < 40 && !charas[0].isReacting && !charas[1].isReacting) {
            // おしゃべり確率を少し調整して、歩くのを邪魔しすぎないように
            if (Math.random() > 0.4) return; 

            charas[0].isReacting = true;
            charas[1].isReacting = true;

            const randomPair = chatPhrases[Math.floor(Math.random() * chatPhrases.length)];
            
            // 向き合わせる
            const factor0 = parseFloat(charas[0].element.style.getPropertyValue('--base-scale-y')) || 1;
            const factor1 = parseFloat(charas[1].element.style.getPropertyValue('--base-scale-y')) || 1;

            if (charas[0].x < charas[1].x) {
                charas[0].element.style.transform = `scale(${-1 * factor0}, ${factor0})`;
                charas[1].element.style.transform = `scale(${1 * factor1}, ${factor1})`;
            } else {
                charas[0].element.style.transform = `scale(${1 * factor0}, ${factor0})`;
                charas[1].element.style.transform = `scale(${-1 * factor1}, ${factor1})`;
            }

            // 1人目発言
            charas[0].bubble.innerText = randomPair[0];
            charas[0].bubble.style.display = 'block';

            // 0.8秒後に2人目発言
            setTimeout(() => {
                charas[1].bubble.innerText = randomPair[1];
                charas[1].bubble.style.display = 'block';
            }, 800);

            // 2.5秒後に会話終了、解散
            setTimeout(() => {
                charas[0].bubble.style.display = 'none';
                charas[1].bubble.style.display = 'none';
                charas[0].isReacting = false;
                charas[1].isReacting = false;
                updatePosition(charas[0]);
                updatePosition(charas[1]);
            }, 2500);
        }
    }

    // 3. タップしたときのリアクション
    function tapChara(id) {
        const c = charas.find(item => item.id === id);
        if (c.isReacting) return;
        c.isReacting = true;

        c.element.style.backgroundImage = `url('${c.imgEat}')`;
        c.element.classList.add('jump-animation');

        setTimeout(() => {
            c.element.classList.remove('jump-animation');
            c.element.style.backgroundImage = `url('${c.imgNormal}')`;
            c.isReacting = false;
            updatePosition(c);
        }, 400);
    }

    // 4. ふたりにおやつをあげる
    function giveSnackAll() {
        if (charas[0].isReacting || charas[1].isReacting) return;
        
        charas[0].isReacting = true;
        charas[1].isReacting = true;

        snack.style.display = 'block';

        // おやつの近く（手前側）へダッシュ！
        charas[0].direction = -1;
        charas[0].x = 160;
        charas[0].y = 80;
        updatePosition(charas[0]);
        
        charas[1].direction = -1;
        charas[1].x = 220;
        charas[1].y = 90;
        updatePosition(charas[1]);

        setTimeout(() => {
            charas[0].element.style.backgroundImage = `url('${charas[0].imgEat}')`;
            charas[1].element.style.backgroundImage = `url('${charas[1].imgEat}')`;
            snack.style.display = 'none';

            setTimeout(() => {
                charas[0].element.style.backgroundImage = `url('${charas[0].imgNormal}')`;
                charas[1].element.style.backgroundImage = `url('${charas[1].imgNormal}')`;
                charas[0].isReacting = false;
                charas[1].isReacting = false;
                updatePosition(charas[0]);
                updatePosition(charas[1]);
            }, 1200);
        }, 1300);
    }
</script>

</body>
</html>
