<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海の見える部屋のよにん - フルシステム版</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        /* ゲームの舞台 */
        .stage-container {
            width: 350px;
            height: 550px;
            background-image: url('background_day.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 6px solid #fff;
            transition: background-image 2.5s ease; /* 時間変化のフェード演出 */
        }

        /* キャラクター共通設定 */
        .character {
            width: 95px; 
            height: 95px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            position: absolute;
            transition: left 1.5s ease-in-out, bottom 1.5s ease-in-out, transform 0.3s ease;
            cursor: grab;
            user-select: none;
            z-index: 10;
        }
        .character:active {
            cursor: grabbing;
        }

        /* すやすや眠っている時のZzzエフェクト */
        @keyframes sleepZzz {
            0% { opacity: 0; transform: translateY(0) scale(0.6); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px) scale(1); }
        }
        .character.sleep::after {
            content: '💤';
            position: absolute;
            top: -10px;
            right: 10px;
            font-size: 16px;
            animation: sleepZzz 2s infinite ease-in-out;
        }

        /* おしゃべり・リアクション中の吹き出し */
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 30;
            white-space: nowrap;
            transition: left 1.5s ease-in-out, bottom 1.5s ease-in-out;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }

        /* ジャンプアニメーション */
        @keyframes jump {
            0% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
            50% { transform: translate(0, -25px) scale(var(--base-scale-x), var(--base-scale-y)); }
            100% { transform: translate(0, 0) scale(var(--base-scale-x), var(--base-scale-y)); }
        }
        .jump-animation {
            animation: jump 0.4s ease;
        }

        /* ごちそう（机の上にぴったり配置） */
        .snack {
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 155px; 
            right: 110px;  
            display: none;
            z-index: 15;
        }

        /* 操作パネル */
        .controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 40;
        }

        /* ごはん選択メニュー */
        .menu-popup {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #00796b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .menu-btn {
            background-color: #00796b;
            color: white;
        }
    </style>
</head>
<body>

<div class="stage-container" id="stage">
    <div id="bubble1" class="speech-bubble"></div>
    <div id="bubble2" class="speech-bubble"></div>
    <div id="bubble3" class="speech-bubble"></div>
    <div id="bubble4" class="speech-bubble"></div>

    <div id="chara1" class="character"></div>
    <div id="chara2" class="character"></div>
    <div id="chara3" class="character"></div>
    <div id="chara4" class="character"></div>

    <div id="snack" class="snack"></div>

    <div class="controls">
        <div id="menuPopup" class="menu-popup">
            <button onclick="giveFood('snack.png')">🍩 ドーナツ</button>
            <button onclick="giveFood('parfait.png')"> パフェ</button>
            <button onclick="giveFood('food_meat.png')">🍖 ほねつき肉</button>
            <button onclick="giveFood('food_omurice.png')">🍳 オムライス</button>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">みんなにごはんをあげる</button>
    </div>
</div>

<script>
    const stage = document.getElementById('stage');
    const snack = document.getElementById('snack');
    const menuPopup = document.getElementById('menuPopup');

    // === 1. 好感度・状態・時間管理データ ===
    let currentTimeOfDay = -1; 
    const backgrounds = {
        0: 'background_morning.png',   // 朝 5:00〜10:59
        1: 'background_day.png',       // 昼 11:00〜16:59
        2: 'background_evening.png',   // 夕 17:00〜20:59
        3: 'background_night.png'      // 夜 21:00〜4:59
    };

    const charas = [
        { id: 1, element: document.getElementById('chara1'), bubble: document.getElementById('bubble1'), imgNormal: 'chara_normal.png', imgEat: 'chara_eat.png', imgSleep: 'chara1_sleep.png', imgKyaa: 'chara1_kyaa.png', x: 40, y: 60, direction: 1, isReacting: false, isSleeping: false, petCount: 0 },
        { id: 2, element: document.getElementById('chara2'), bubble: document.getElementById('bubble2'), imgNormal: 'chara_island.png', imgEat: 'chara_island_eat.png', imgSleep: 'chara2_sleep.png', imgKyaa: 'chara2_kyaa.png', x: 120, y: 110, direction: 1, isReacting: false, isSleeping: false, petCount: 0 },
        { id: 3, element: document.getElementById('chara3'), bubble: document.getElementById('bubble3'), imgNormal: 'chara_death.png', imgEat: 'chara_death_eat.png', imgSleep: 'chara3_sleep.png', imgKyaa: 'chara3_kyaa.png', x: 200, y: 70, direction: 1, isReacting: false, isSleeping: false, petCount: 0 },
        { id: 4, element: document.getElementById('chara4'), bubble: document.getElementById('bubble4'), imgNormal: 'chara_priest.png', imgEat: 'chara_priest_eat.png', imgSleep: 'chara4_sleep.png', imgKyaa: 'chara4_kyaa.png', x: 260, y: 120, direction: 1, isReacting: false, isSleeping: false, petCount: 0 }
    ];

    const chatPhrases = [
        ["あ、こんにちは！", "ふふ、こんにちはー。"],
        ["海がきれいで落ち着くね", "今日のごはんは何かな？"],
        ["お仕事お疲れ様です！", "あはは、ありがとう！"],
        ["ちょっとそこ通してー！", "わわ、ごめんごめん！"],
        ["ねえねえ！", "なぁに？"]
    ];

    // 背景時間更新
    function getTimeOfDay() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return 0;      
        if (hour >= 11 && hour < 17) return 1;     
        if (hour >= 17 && hour < 21) return 2;     
        return 3;                                  
    }

    function updateBackground() {
        const newTime = getTimeOfDay();
        if (newTime !== currentTimeOfDay) {
            currentTimeOfDay = newTime;
            stage.style.backgroundImage = `url('${backgrounds[currentTimeOfDay]}')`;
        }
    }
    setInterval(updateBackground, 30000);
    updateBackground();

    // 初期配置
    charas.forEach(c => {
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        updatePosition(c);
        makeDraggable(c); // ドラッグ・タップ処理を登録
    });

    // 位置とスケールの更新
    function updatePosition(c) {
        c.element.style.left = c.x + 'px';
        c.element.style.bottom = c.y + 'px';

        const scaleFactor = 1 - ((c.y - 40) / 120) * 0.35;
        const scaleX = c.direction * scaleFactor;
        const scaleY = scaleFactor;

        c.element.style.setProperty('--base-scale-x', scaleX);
        c.element.style.setProperty('--base-scale-y', scaleY);
        c.element.style.transform = `scale(${scaleX}, ${scaleY})`;
        
        c.element.style.zIndex = 20 - Math.floor(c.y / 10);

        c.bubble.style.left = (c.x + 5) + 'px';
        c.bubble.style.bottom = (c.y + 100 * scaleFactor) + 'px';
    }

    // 縦横無尽ウォーキング
    function walk(charaIndex) {
        const c = charas[charaIndex];
        if (c.isReacting || c.isSleeping) return;

        const newX = Math.floor(Math.random() * 215) + 15;
        const newY = Math.floor(Math.random() * 110) + 40; 
        
        c.direction = (newX < c.x) ? 1 : -1;
        c.x = newX;
        c.y = newY;

        updatePosition(c);
        
        if (Math.random() < 0.15) {
            checkChat();
        }

        setTimeout(() => walk(charaIndex), Math.floor(Math.random() * 1800) + 1200);
    }
    
    charas.forEach((_, index) => {
        setTimeout(() => walk(index), index * 400);
    });

    // おしゃべりシステム
    function checkChat() {
        const i1 = Math.floor(Math.random() * 4);
        const i2 = (i1 + 1) % 4;
        const c1 = charas[i1];
        const c2 = charas[i2];

        if (!c1.isReacting && !c2.isReacting && !c1.isSleeping && !c2.isSleeping) {
            const dist = Math.abs(c1.x - c2.x) + Math.abs(c1.y - c2.y);
            if (dist < 90) {
                c1.isReacting = true;
                c2.isReacting = true;

                const pair = chatPhrases[Math.floor(Math.random() * chatPhrases.length)];
                
                c1.direction = (c1.x < c2.x) ? -1 : 1;
                c2.direction = (c2.x < c1.x) ? -1 : 1;
                updatePosition(c1);
                updatePosition(c2);

                showBubble(c1, pair[0]);
                setTimeout(() => showBubble(c2, pair[1]), 700);

                setTimeout(() => {
                    c1.bubble.style.display = 'none';
                    c2.bubble.style.display = 'none';
                    c1.isReacting = false;
                    c2.isReacting = false;
                }, 2600);
            }
        }
    }

    function showBubble(c, text) {
        c.bubble.innerText = text;
        c.bubble.style.display = 'block';
    }

    // === 2. ドラッグ＆スワイプで「きゃー！」システム ===
    function makeDraggable(chara) {
        let isDragging = false;
        let startX, startY, startLeft, startBottom;

        function dragStart(clientX, clientY) {
            if (chara.isSleeping) return;
            isDragging = true;
            chara.isReacting = true;

            chara.element.style.transition = 'none';
            chara.bubble.style.transition = 'none';
            
            // きゃー顔に変身！
            chara.element.style.backgroundImage = `url('${chara.imgKyaa}')`;

            const rect = chara.element.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();

            startX = clientX;
            startY = clientY;
            startLeft = rect.left - stageRect.left;
            startBottom = stageRect.bottom - rect.bottom;
        }

        function dragMove(clientX, clientY) {
            if (!isDragging) return;
            const deltaX = clientX - startX;
            const deltaY = clientY - startY;

            let newLeft = startLeft + deltaX;
            let newBottom = startBottom - deltaY;

            // 枠からはみ出さない制限
            chara.x = Math.max(0, Math.min(newLeft, 255));
            chara.y = Math.max(10, Math.min(newBottom, 440));

            updatePosition(chara);
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;

            // 元の滑らかな歩行スピードに戻す
            chara.element.style.transition = 'left 1.5s ease-in-out, bottom 1.5s ease-in-out, transform 0.3s ease';
            chara.bubble.style.transition = 'left 1.5s ease-in-out, bottom 1.5s ease-in-out';
            
            // 地面の高さ(40〜150px)に優しく着地させる
            if (chara.y > 150) chara.y = 150;
            if (chara.y < 40) chara.y = 40;

            chara.element.style.backgroundImage = `url('${chara.imgNormal}')`;
            chara.isReacting = false;
            updatePosition(chara);

            showBubble(chara, 'きゃー😵💕');
            setTimeout(() => { if(!chara.isReacting) chara.bubble.style.display = 'none'; }, 1400);
        }

        // マウスイベント (PC用)
        chara.element.addEventListener('mousedown', e => {
            // 左クリックのみ（ダブルクリックでの睡眠を邪魔しない）
            if(e.detail === 1) dragStart(e.clientX, e.clientY);
        });
        document.addEventListener('mousemove', e => { if (isDragging) dragMove(e.clientX, e.clientY); });
        document.addEventListener('mouseup', dragEnd);

        // タッチイベント (スマホ用)
        chara.element.addEventListener('touchstart', e => {
            dragStart(e.touches[0].clientX, e.touches[0].clientY);
        });
        document.addEventListener('touchmove', e => { if (isDragging) dragMove(e.touches[0].clientX, e.touches[0].clientY); });
        document.addEventListener('touchend', dragEnd);

        // クイックタップ/ダブルクリックで「なでなで睡眠」
        chara.element.addEventListener('click', e => {
            // ドラッグした時はカウントしない
            tapChara(chara);
        });
    }

    // === 3. タップでなでなで ➔ すやすや睡眠システム ===
    function tapChara(c) {
        if (c.isReacting || c.isSleeping) return;

        c.petCount++;
        
        if (c.petCount >= 5) {
            // 5回撫でるとすやすや眠る
            c.isSleeping = true;
            c.element.style.backgroundImage = `url('${c.imgSleep}')`;
            c.element.classList.add('sleep');
            showBubble(c, 'すぅ…すぅ…😪');
            
            // 8.5秒後に気持ちよく目が覚める
            setTimeout(() => {
                if (c.isSleeping) {
                    c.isSleeping = false;
                    c.petCount = 0;
                    c.element.style.backgroundImage = `url('${c.imgNormal}')`;
                    c.element.classList.remove('sleep');
                    c.bubble.style.display = 'none';
                    // 歩行を再起動
                    walk(charas.indexOf(c));
                }
            }, 8500);
        } else {
            // 撫でられている途中の可愛いセリフ
            showBubble(c, c.petCount >= 3 ? 'んぅ…ねむいぃ…♡' : 'んっ…♡');
            setTimeout(() => { if(!c.isSleeping && !c.isReacting) c.bubble.style.display = 'none'; }, 900);
        }
    }

    // ごはんメニュー
    function toggleMenu() {
        menuPopup.style.display = (menuPopup.style.display === 'flex') ? 'none' : 'flex';
    }

    function giveFood(imgFile) {
        if (charas.some(c => c.isReacting || c.isSleeping)) return;
        menuPopup.style.display = 'none';

        snack.style.backgroundImage = `url('${imgFile}')`;
        snack.style.display = 'block';

        const targets = [
            { x: 100, y: 120, dir: -1 },
            { x: 140, y: 100, dir: -1 },
            { x: 170, y: 120, dir: 1 },
            { x: 210, y: 100, dir: 1 }
        ];

        charas.forEach((c, idx) => {
            c.isReacting = true;
            c.x = targets[idx].x;
            c.y = targets[idx].y;
            c.direction = targets[idx].dir;
            updatePosition(c);
        });

        setTimeout(() => {
            charas.forEach(c => {
                c.element.style.backgroundImage = `url('${c.imgEat}')`;
            });
            snack.style.display = 'none';

            setTimeout(() => {
                charas.forEach(c => {
                    c.element.style.backgroundImage = `url('${c.imgNormal}')`;
                    c.isReacting = false;
                    updatePosition(c);   
                });
                
                // 全員のウロウロを再起動
                charas.forEach((_, index) => {
                    setTimeout(() => walk(index), 300 + index * 200);
                });
            }, 1500);
        }, 1600);
    }
</script>

</body>
</html>
